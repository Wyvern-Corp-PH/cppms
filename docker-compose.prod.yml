name: cppms

services:
  caddy:
    build:
      context: ./docker/caddy
      dockerfile: Dockerfile
    image: ${GHCR_REGISTRY:-local}/cppms-caddy:${IMAGE_TAG:-dev}
    container_name: cppms-caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./docker/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      pocketbase:
        condition: service_healthy
      public-frontend:
        condition: service_healthy
      admin-frontend:
        condition: service_healthy

  pocketbase:
    image: ${GHCR_REGISTRY:-local}/cppms-pocketbase:${IMAGE_TAG:-dev}
    build:
      context: ./packages/pocketbase
      dockerfile: Dockerfile
    container_name: cppms-pocketbase
    restart: unless-stopped
    expose:
      - "8090"
    environment:
      ORIGINS: ${ORIGINS}
      POCKETBASE_ENCRYPTION_KEY: ${POCKETBASE_ENCRYPTION_KEY}
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_STDOUT: ${LOG_STDOUT:-1}
    volumes:
      - pocketbase_data:/pb/pb_data
      - ./packages/pocketbase/pb_migrations:/pb/pb_migrations:ro
      - ./packages/pocketbase/pb_hooks:/pb/pb_hooks:ro
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O- http://localhost:8090/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: >
      sh -c "
      chown -R pbuser:pbgroup /pb/pb_data &&
      exec su-exec pbuser sh -c '
      echo \"Creating superuser...\" &&
      ./pocketbase superuser upsert \"$$POCKETBASE_ADMIN_EMAIL\" \"$$POCKETBASE_ADMIN_PASSWORD\" --encryptionEnv=POCKETBASE_ENCRYPTION_KEY &&
      echo \"Starting pocketbase...\" &&
      exec ./pocketbase serve --http=0.0.0.0:8090 --origins=$$ORIGINS --encryptionEnv=POCKETBASE_ENCRYPTION_KEY
      '"

  public-frontend:
    image: ${GHCR_REGISTRY:-local}/cppms-public-frontend:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: apps/public-frontend/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_POCKETBASE_URL: ${NEXT_PUBLIC_POCKETBASE_URL}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL}
        NEXT_PUBLIC_PUBLIC_URL: ${NEXT_PUBLIC_PUBLIC_URL}
    container_name: cppms-public
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      pocketbase:
        condition: service_healthy

  admin-frontend:
    image: ${GHCR_REGISTRY:-local}/cppms-admin-frontend:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: apps/admin-frontend/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_POCKETBASE_URL: ${NEXT_PUBLIC_POCKETBASE_URL}
        BASE_PATH: /admin
    container_name: cppms-admin
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      BASE_PATH: /admin
      HOSTNAME: 0.0.0.0
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/admin || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      pocketbase:
        condition: service_healthy

  # One-shot demo seed (profile: seed). Same pattern as docker-compose.local.yml.
  #   bun run seed:docker:prod
  #   bun run seed:docker:prod:force
  seed:
    profiles: ["seed"]
    image: oven/bun:1.3.13-alpine
    working_dir: /app
    env_file:
      - .env
    environment:
      POCKETBASE_INTERNAL_URL: http://pocketbase:8090
      SEED_ARGS: ${SEED_ARGS:-}
    volumes:
      - .:/app
      - seed_node_modules:/app/node_modules
    depends_on:
      pocketbase:
        condition: service_healthy
    entrypoint: ["sh", "-ec"]
    command:
      - |
        bun install --frozen-lockfile
        exec bun --env-file .env packages/pocketbase/scripts/seed-dev.ts $$SEED_ARGS

volumes:
  pocketbase_data:
  caddy_data:
  caddy_config:
  seed_node_modules:
